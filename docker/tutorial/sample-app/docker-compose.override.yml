version: '3.8'

# =====================================================================================
# Override 覆寫設定檔教學：
# 1. 只要將這個檔案與 `docker-compose.yml` 放在同一個目錄下，
# 2. 當執行 `docker compose up -d` 時，Docker 會自動讀取並將此檔案與基礎設定檔合併。
# 3. 遇到相同屬性時（例如 environment, ports），這裡的設定會覆蓋或擴充原有的設定。
# 4. 實務建議：將此檔加入 .gitignore，讓每位工程師依據自己的開發習慣客製化這個檔案。
# =====================================================================================

services:
  
  # 針對基礎檔的 `webapp` 服務進行修改
  webapp:
    
    # 擴充與覆寫環境變數
    environment:
      # 將系統環境強制設為 Development，開啟詳細錯誤畫面 (此行在基礎檔也有，所以會覆寫過去)
      - ASPNETCORE_ENVIRONMENT=Development
      # 新增的環境變數：開啟 ASP.NET Core 更詳細的錯誤日誌
      - ASPNETCORE_DETAILEDERRORS=true
    
    # 擴充 Volume (掛載空間) - ★ 本機開發的進階技巧 ★
    volumes:
      # Bind Mount: 語法為 "本機路徑:容器內路徑"
      # ./ 代表目前這份檔案所在的目錄。
      # 這裡我們將本機的原始碼資料夾，直接對應覆蓋到容器內的 /src 目錄。
      # 配合 `.NET Hot Reload (dotnet watch)`，您只要在本機一存檔，
      # 容器裡的程式碼就會立刻更新並重新編譯，完全不需要重新 docker build！
      - ./:/src
    
    # 擴充 Ports (對外通訊埠)
    ports:
      # 假設基礎檔已經開放了 8080，但你本機開發想額外多開一個 8081 Port
      # 來接一些 Debug 工具或是其他服務，就可以在這裡寫。
      - "8081:8081"
